<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <title>Dashboard</title>

    <style>
        body {
            min-height: 100vh;
            display: flex;
            background-color: #f8f9fa;
            overflow-x: hidden;
        }

        /* SIDEBAR STYLES */
        .sidebar {
            width: 280px;
            height: 100vh;
            background-color: #840CA9;
            position: sticky;
            top: 0;
            color: white;
            z-index: 1000;
        }

        .sidebar hr {
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            opacity: 1;
        }

        .empty-kwan{
            margin-top: 60px;
        }

        .nav-pills .nav-link {
            color: white;
            font-size: 1.1rem;
            padding: 10px 15px;
            display: flex;
            align-items: center;
        }

        .nav-pills .nav-link.active {
            background-color: #BF66DB;
        }

        .nav-pills .nav-link:hover:not(.active) {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
        }

        /* Styling for the Logout button */
        .logout-link {
            font-weight: 600;
            font-size: 1.3rem !important;
            transition: 0.3s;
            text-decoration: none;
            color: white;
        }

        .logout-link i {
            font-size: 1.8rem;
        }

        .logout-link:hover {
            color: #efefef;
            opacity: 0.8;
        }

        /* TOP NAV BAR STYLES */
        .top-nav {
            height: 80px;
            background-color: white;
            border-bottom: 1px solid #dee2e6;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
        }

        .search-box {
            background-color: #efefef;
            border-radius: 10px;
            display: flex;
            align-items: center;
            padding: 10px 20px;
            width: 400px;
        }

        .search-box input {
            background: transparent;
            border: none;
            outline: none;
            margin-left: 10px;
            width: 100%;
            color: #6c757d;
        }

        .profile-border {
            border: 3px solid #840CA9;
            padding: 2px;
            border-radius: 50%;
            display: inline-block;
        }

        .profile-img-top {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 50%;
        }

        .main-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .content-area {
            padding: 30px;
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="d-flex flex-column flex-shrink-0 p-3 sidebar">
        <div class="empty-kwan"></div>
        <hr>
        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item"><a href="#" class="nav-link active"><i class="bi bi-house me-3"></i> Dashboard</a></li>
            <li><a href="#" class="nav-link"><i class="bi bi-calendar2-check me-3"></i> Attendance Log</a></li>
            <li><a href="#" class="nav-link"><i class="bi bi-person-lines-fill me-3"></i> Student Masterlist</a></li>
            <li><a href="#" class="nav-link"><i class="bi bi-buildings me-3"></i> Industry Partners</a></li>
            <li><a href="#" class="nav-link"><i class="bi bi-file-earmark-bar-graph me-3"></i> Report Generation</a></li>
            <li><a href="#" class="nav-link"><i class="bi bi-person-circle me-3"></i> Profile</a></li>
        </ul>
        <hr>
        
        <!-- CENTERED LOGOUT BUTTON -->
        <div class="pb-3 d-flex justify-content-center">
            <a href="#" class="d-flex align-items-center logout-link">
                <i class="bi bi-box-arrow-left me-2"></i>
                <span>Logout</span>
            </a>
        </div>
    </div>

    <!-- Main Section (Top Nav + Content) -->
    <div class="main-container">
        
        <!-- Top Navigation Bar -->
        <nav class="top-nav">
            <div class="search-box">
                <i class="bi bi-search text-secondary"></i>
                <input type="text" placeholder="Search....">
            </div>

            <div class="d-flex align-items-center">
                <span class="fw-bold me-4 text-dark">Monday, March 32, 2062</span>
                <div class="profile-border">
                    <!-- Changed src to a placeholder so it works for you immediately -->
                    <img src="/Pictures/images.jpg" alt="profile" class="profile-img-top">
                </div>
            </div>
        </nav>

        <!-- Content Area -->
        <div class="content-area">
            <h1>Hello John Arckie!</h1>
            <p>Immersion Teacher</p>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
